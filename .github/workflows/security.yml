name: Security Audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Monday 14:00 UTC (07:00 PT) — same cadence as Dependabot so new PRs and
    # fresh advisories land together.
    - cron: '0 14 * * 1'

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  cargo-audit:
    name: cargo audit (src-tauri)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo-audit binary
        id: cache-audit
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-audit
          key: cargo-audit-bin-${{ runner.os }}-v1

      - name: Install cargo-audit
        if: steps.cache-audit.outputs.cache-hit != 'true'
        run: cargo install cargo-audit --locked

      # Default behavior: fails on vulnerabilities, logs (but does not fail on)
      # unmaintained/unsound warnings. Tighten to `--deny warnings` once #29
      # retires pdf-extract 0.7 / docx-rs 0.4.
      #
      # --ignore RUSTSEC-2023-0071: rsa 0.9.x Marvin-attack timing sidechannel.
      # No upstream fix available. Pulled in transitively by sqlx-macros-core's
      # sqlx-mysql driver even though we only enable the sqlite feature — the
      # MySQL code path is never invoked at runtime. Revisit when rsa publishes
      # a constant-time fix or sqlx-macros splits drivers behind features.
      - name: Run cargo audit
        working-directory: src-tauri
        run: cargo audit --ignore RUSTSEC-2023-0071

  npm-audit:
    name: npm audit (${{ matrix.name }})
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: root
            directory: .
          - name: proxy
            directory: proxy
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: 'npm'
          cache-dependency-path: ${{ matrix.directory }}/package-lock.json

      - name: Run npm audit
        working-directory: ${{ matrix.directory }}
        run: npm audit --omit=dev --audit-level=high
