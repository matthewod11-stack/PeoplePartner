name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
    runs-on: ${{ matrix.platform }}
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: 'aarch64-apple-darwin,x86_64-apple-darwin'

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Verify version alignment
        shell: bash
        run: |
          CARGO_V=$(grep -E '^version = ' src-tauri/Cargo.toml | head -1 | cut -d'"' -f2)
          PKG_V=$(jq -r .version package.json)
          TAURI_V=$(jq -r .version src-tauri/tauri.conf.json)
          echo "Cargo.toml:       $CARGO_V"
          echo "package.json:     $PKG_V"
          echo "tauri.conf.json:  $TAURI_V"
          if [ "$CARGO_V" != "$PKG_V" ] || [ "$CARGO_V" != "$TAURI_V" ]; then
            echo "::error::Version mismatch across manifests — bump all three together"
            exit 1
          fi
          echo "All manifests agree on version $CARGO_V"

      - name: Validate entitlements
        shell: bash
        run: |
          # Pre-notarize gate. Catches release-blocker plist misconfigs BEFORE
          # burning macOS-runner minutes on signing + notarization.
          # Origin: v0.2.0/v0.2.1 sandbox incident (#18, #41).
          PLIST=src-tauri/Entitlements.plist
          if [ ! -f "$PLIST" ]; then
            echo "::error::$PLIST not found"
            exit 1
          fi
          if grep -q 'com.apple.security.app-sandbox' "$PLIST"; then
            echo "::error::App Sandbox must not be enabled for Developer ID distribution — it breaks the auto-updater. See #18/#41."
            exit 1
          fi
          for KEY in cs.allow-jit cs.allow-unsigned-executable-memory cs.disable-library-validation; do
            if ! grep -q "com.apple.security.$KEY" "$PLIST"; then
              echo "::error::Required hardened-runtime carve-out missing from $PLIST: com.apple.security.$KEY"
              exit 1
            fi
          done
          echo "Entitlements OK: no sandbox, all 3 hardened-runtime carve-outs present."

      - name: Build and Release
        id: tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          HRCOMMAND_PROXY_SIGNING_SECRET: ${{ secrets.HRCOMMAND_PROXY_SIGNING_SECRET }}
        with:
          tagName: v__VERSION__
          releaseName: 'People Partner v__VERSION__'
          releaseBody: 'See the assets to download and install this version.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      - name: Verify latest.json asset URLs
        if: matrix.args == '--target aarch64-apple-darwin'
        shell: bash
        env:
          REPO: ${{ github.repository }}
        run: |
          # Prevent regression of the HRCommand -> PeoplePartner rename issue:
          # tauri-action embeds the repo slug from build time into latest.json,
          # so a stale workflow on a forked/renamed repo can publish a manifest
          # whose asset URLs point at the old repo slug.
          MANIFEST=$(find src-tauri/target -name 'latest.json' -print -quit)
          if [ -z "$MANIFEST" ]; then
            echo "::warning::latest.json not found — skipping URL check"
            exit 0
          fi
          echo "Found manifest at: $MANIFEST"
          cat "$MANIFEST"
          if grep -q 'HRCommand' "$MANIFEST"; then
            echo "::error::latest.json contains HRCommand URLs — manifest is stale"
            exit 1
          fi
          if ! grep -q "$REPO" "$MANIFEST"; then
            echo "::error::latest.json asset URLs do not reference $REPO"
            exit 1
          fi
          echo "latest.json asset URLs correctly reference $REPO"
