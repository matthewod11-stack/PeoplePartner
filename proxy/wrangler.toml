name = "hrcommand-proxy"
main = "src/index.ts"
compatibility_date = "2024-12-01"

kv_namespaces = [
  { binding = "QUOTA", id = "8153bf7c368e4b4ab79ad9660f9e4722", preview_id = "58a6cb2429b84a61a0b799cc899e63b8" }
]

[vars]
MAX_MESSAGES = "50"
ALLOWED_MODEL = "claude-sonnet-4-20250514"
ALLOWED_ORIGINS = "tauri://localhost,http://localhost:1420"
MAX_SIGNATURE_AGE_SECONDS = "300"
MAX_IP_REQUESTS_PER_HOUR = "300"

# CLAUDE_API_KEY must be set as a secret:
#   wrangler secret put CLAUDE_API_KEY
#
# Optional but strongly recommended for abuse protection:
#   wrangler secret put TRIAL_SIGNING_SECRET
